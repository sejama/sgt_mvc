name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  phpunit:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: sgt_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      APP_ENV: test
      DATABASE_URL: mysql://root:root@127.0.0.1:3306/sgt_test?serverVersion=8.0.40&charset=utf8mb4
      XDEBUG_MODE: coverage

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Detect project directory
        id: project-dir
        shell: bash
        run: |
          if [ -f "composer.json" ] && [ -f "phpunit.xml.dist" ]; then
            echo "dir=." >> "$GITHUB_OUTPUT"
          elif [ -f "src/sgt_mvc/composer.json" ] && [ -f "src/sgt_mvc/phpunit.xml.dist" ]; then
            echo "dir=src/sgt_mvc" >> "$GITHUB_OUTPUT"
          else
            echo "No se encontro el directorio del proyecto Symfony/PHPUnit"
            pwd
            ls -la
            exit 1
          fi

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: xdebug
          tools: composer:v2

      - name: Install dependencies
        working-directory: ${{ steps.project-dir.outputs.dir }}
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare test database
        working-directory: ${{ steps.project-dir.outputs.dir }}
        run: |
          php bin/console doctrine:database:create --if-not-exists --env=test --no-interaction
          php bin/console doctrine:migrations:migrate --env=test --no-interaction

      - name: Run test suites with coverage gate
        working-directory: ${{ steps.project-dir.outputs.dir }}
        run: composer test:ci
